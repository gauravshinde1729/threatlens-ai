# ML model hyperparameters and training configuration
# All model parameters must be sourced from this file — no hardcoding in src/

random_forest:
  n_estimators: 100
  max_depth: 15
  min_samples_split: 5
  random_state: 42

xgboost:
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  eval_metric: logloss
  random_state: 42

cross_validation:
  n_splits: 5
  shuffle: true

model_registry:
  path: "data/models/"
  format: "joblib"
